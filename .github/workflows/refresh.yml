name: Sourcing Dashboard Refresh

# Pulls latest sourcing_dashboard_per_sourcer table from Keboola Storage API,
# aggregates to quarterly, writes data.json, commits, and deploys to Cloudflare
# Pages directly via wrangler. Tribe Pages project is direct-upload (no Git
# auto-deploy), so this workflow must run wrangler deploy explicitly.
#
# Required repo secrets:
#   - KEBOOLA_STORAGE_API_TOKEN  (read-only Keboola Storage API token)
#   - CLOUDFLARE_API_TOKEN       (Workers/Pages edit scope, account-scoped)

on:
  schedule:
    - cron: "30 6 * * 1-5"   # 06:30 UTC weekdays (after Keboola WBR/MBR refresh)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: tribe-sourcing-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install requests

      - name: Pull Keboola → write data.json
        env:
          KEBOOLA_STORAGE_API_TOKEN: ${{ secrets.KEBOOLA_STORAGE_API_TOKEN }}
        run: python pipeline/refresh.py

      - name: Commit refreshed data.json
        id: commit
        run: |
          set -euo pipefail
          git config user.name "tribe-sourcing-refresh-bot"
          git config user.email "blake+sourcing-refresh@tribe.xyz"
          git add data.json
          if git diff --cached --quiet; then
            echo "No data change; skipping commit + deploy."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "data refresh: $(date -u +%Y-%m-%dT%H:%MZ)"
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        if: steps.commit.outputs.changed == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: "5d0766568bdf8eac7e6c06486fe7884c"
          command: pages deploy . --project-name=tribe-sourcing --branch=main --commit-dirty=true
